name: 주간 신문 빌드

on:
  schedule:
    - cron: '0 21 * * 0'   # 매주 일요일 21:00 UTC = 월요일 06:00 KST
  workflow_dispatch:         # 수동 실행 (Actions 탭 → Run workflow)

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: paper-newspaper/requirements.txt

      - name: 의존성 설치
        run: pip install -r paper-newspaper/requirements.txt

      - name: 파이프라인 실행 (RSS → AI 점수 → 이미지 보강 → JSON 저장)
        working-directory: paper-newspaper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRANDERKU_FEED_URL: ${{ secrets.BRANDERKU_FEED_URL }}
          TAMBANG_FEED_URL: ${{ secrets.TAMBANG_FEED_URL }}
        run: python main.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add paper-newspaper/data/
          if git diff --cached --quiet; then
            echo "변경된 데이터 없음 — 커밋 생략"
          else
            ISSUE_DATE=$(date -u '+%Y-%m-%d')
            git commit -m "chore: 주간 빌드 ${ISSUE_DATE} [skip ci]"
            git push
          fi
